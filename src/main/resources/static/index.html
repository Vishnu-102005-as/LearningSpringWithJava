<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Employee Entry</title>
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <main>
        <h2>Enter Employee Details</h2>
        <br> 
  <form id="employeeForm">
    <label for="name">Name:</label>
    <input type="text" id="name" required><br><br>

    <label for="dept">Department:</label>
    <input type="text" id="dept" required><br><br>

    <label for="email">Email:</label>
    <input type="email" id="email" required><br><br>

    <label for="password">Password:</label>
    <input type="password" id="password" required><br><br>

    <label for="salary">Salary:</label>
    <input type="number" id="salary" required><br><br>

    <label for="bonus">Bonus:</label>
    <input type="number" id="bonus"><br><br>

    <label for="credit">Credit:</label>
    <input type="number" id="credit"><br><br>

    <label for="experience">Experience (years):</label>
    <input type="number" id="experience"><br><br>

    <button type="submit">Save Employee</button>
    </form>
    </main>
</body>
</html>
